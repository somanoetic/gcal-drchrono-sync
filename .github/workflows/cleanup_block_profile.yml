name: Cleanup Block Profile

on:
  workflow_dispatch:
    inputs:
      delete:
        description: "Set to 'yes' to actually delete (otherwise dry run)"
        required: true
        default: "no"

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached state and tokens
        uses: actions/cache/restore@v4
        with:
          path: |
            token.json
            .drchrono_token.json
            sync_state.json
            buffer_state.json
            drchrono_gcal_state.json
            .config_error_notify_state.json
            .conflict_notify_state.json
          key: sync-state-${{ github.run_id }}
          restore-keys: sync-state-

      - name: Write secrets to files
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
          if [ ! -f .drchrono_token.json ]; then
            echo '${{ secrets.DRCHRONO_TOKEN }}' > .drchrono_token.json
          fi

      - name: Run cleanup
        run: |
          if [ "${{ github.event.inputs.delete }}" = "yes" ]; then
            echo "RUNNING WITH --delete"
            python cleanup_block_profile.py --delete
          else
            echo "DRY RUN"
            python cleanup_block_profile.py
          fi

      - name: Save state and tokens to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            token.json
            .drchrono_token.json
            sync_state.json
            buffer_state.json
            drchrono_gcal_state.json
            .config_error_notify_state.json
            .conflict_notify_state.json
          key: sync-state-${{ github.run_id }}
