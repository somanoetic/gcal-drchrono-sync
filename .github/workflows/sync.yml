name: Calendar Sync

on:
  schedule:
    - cron: "*/30 * * * *"   # safety-net polling (event-triggered is primary)
  workflow_dispatch:
  repository_dispatch:
    types: [calendar-changed]

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached state and tokens
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            token.json
            .drchrono_token.json
            sync_state.json
            buffer_state.json
            drchrono_gcal_state.json
            .one_time_cleanup
          key: sync-state-${{ github.run_id }}
          restore-keys: sync-state-

      - name: Write secrets to files
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

          # Always write Google token from secret (scopes may have changed)
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

          # DrChrono token: prefer cached (it rotates), fall back to secret
          if [ ! -f .drchrono_token.json ]; then
            echo '${{ secrets.DRCHRONO_TOKEN }}' > .drchrono_token.json
          fi

      # TODO: Remove after first successful run — deletes old patient-based blocks
      - name: One-time cleanup of patient-based blocks
        run: python cleanup_orphaned_blocks.py --delete --patient=132987328

      - name: Clear sync state for fresh block creation
        run: "python -c \"import json; s=json.load(open('sync_state.json')); s['event_map']={}; s['pending_retries']=[]; json.dump(s,open('sync_state.json','w'),indent=2); print('Cleared sync_state event_map')\""

      - name: Run sync
        run: python run_all.py

      - name: Save state and tokens to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            token.json
            .drchrono_token.json
            sync_state.json
            buffer_state.json
            drchrono_gcal_state.json
          key: sync-state-${{ github.run_id }}
